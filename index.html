<!DOCTYPE html>
<html>
<head>
  <base href="/phsarloan.com/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="phsardata">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>phsardata</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevents browser-level bouncing */
      overscroll-behavior: none; /* Stops swipe-to-close behavior */
      position: fixed; /* Freezes the window layer */
    }
    
    /* Targets the Flutter web host element specifically */
    flutter-view {
      overscroll-behavior: none !important;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script src="https://telegram.org/js/telegram-web-app.js?57"></script>
  
  <script>
    function initTelegram() {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // Forces full-screen mode immediately
        
        // Optional: Disables the vertical swipe-to-close gesture entirely if supported by Telegram client
        if (window.Telegram.WebApp.isVerticalSwipesEnabled === true) {
          window.Telegram.WebApp.disableVerticalSwipes();
        }
      }
    }
    
    // Run immediately and also on fallback load event
    initTelegram();
    window.addEventListener('load', initTelegram);
  </script>
</body>
</html>
